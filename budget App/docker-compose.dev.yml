version: '3.8'

services:
  api:
    image: node:20-alpine
    container_name: budgetlens_api
    working_dir: /app
    command: sh -c "npm ci && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/budgetlens
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      CORS_ORIGINS: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: budgetlens_web
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- -p 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api

  postgres:
    image: postgres:15-alpine
    container_name: budgetlens_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: budgetlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: budgetlens_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: budgetlens_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

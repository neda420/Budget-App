name: BudgetLens CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── API ───────────────────────────────────────────────────────────────────
  api-lint:
    name: API — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint

  api-test:
    name: API — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run test

  api-build:
    name: API — build
    runs-on: ubuntu-latest
    needs: [api-lint, api-test]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: api/dist/
          retention-days: 7

  # ── Web / Mobile frontend ─────────────────────────────────────────────────
  web-lint:
    name: Web — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  web-build:
    name: Web — Next.js static build
    runs-on: ubuntu-latest
    needs: [web-lint]
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'http://localhost:3000' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: web/out/
          retention-days: 7

  # ── Capacitor Android build ───────────────────────────────────────────────
  android-build:
    name: Android — Capacitor build
    runs-on: ubuntu-latest
    needs: [web-build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download web static export
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out
      - run: npm ci
      - name: Capacitor sync (Android)
        run: npx cap sync android
      - name: Build APK (debug)
        run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ── Capacitor iOS build ───────────────────────────────────────────────────
  ios-build:
    name: iOS — Capacitor build
    runs-on: macos-latest
    needs: [web-build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Download web static export
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out
      - run: npm ci
      - name: Capacitor sync (iOS)
        run: npx cap sync ios
      - name: Build (xcodebuild)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build \
            | xcpretty || true
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: web/ios/
          retention-days: 7
